name: bs-user-service
services:
  bs-user-service:
    container_name: bs-user-service
#    image: jonathangunawan30/bs-user-service:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 8001:8001
    env_file:
      - .env
    depends_on:
      - bs-postgres
    networks:
      - bs-network

  bs-postgres:
    container_name: bs-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bs_user_service
    ports:
      - 5432:5432
    networks:
      - bs-network

networks:
  bs-network:
    driver: bridge