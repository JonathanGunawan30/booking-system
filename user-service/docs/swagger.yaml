basePath: /api/v1
definitions:
  dto.LoginRequest:
    properties:
      password:
        maxLength: 100
        minLength: 6
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  dto.RegisterRequest:
    properties:
      confirm_password:
        type: string
      email:
        maxLength: 100
        type: string
      name:
        maxLength: 50
        minLength: 3
        type: string
      password:
        maxLength: 100
        minLength: 6
        type: string
      phone_number:
        maxLength: 15
        minLength: 10
        type: string
      roleID:
        type: integer
      username:
        maxLength: 20
        minLength: 3
        type: string
    required:
    - confirm_password
    - email
    - name
    - password
    - phone_number
    - username
    type: object
  dto.RegisterResponse:
    properties:
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.UpdateRequest:
    properties:
      confirm_password:
        type: string
      email:
        maxLength: 100
        type: string
      name:
        maxLength: 50
        minLength: 3
        type: string
      password:
        type: string
      phone_number:
        maxLength: 15
        minLength: 10
        type: string
      roleID:
        type: integer
      username:
        maxLength: 20
        minLength: 3
        type: string
    required:
    - email
    - name
    - phone_number
    - username
    type: object
  dto.UserResponse:
    properties:
      email:
        type: string
      name:
        type: string
      phone_number:
        type: string
      role:
        type: string
      username:
        type: string
      uuid:
        type: string
    type: object
  response.Response:
    properties:
      data: {}
      message: {}
      status:
        type: string
      token:
        type: string
    type: object
host: localhost:8001
info:
  contact: {}
  description: Microservice for user management and authentication.
  title: User Service API
  version: "1.0"
paths:
  /auth/{uuid}:
    put:
      consumes:
      - application/json
      description: Update the profile of a user by UUID
      parameters:
      - description: User UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: Update Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: Update User Profile
      tags:
      - User
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with username and password to get JWT token
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
      summary: User Login
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user account
      parameters:
      - description: Registration Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.RegisterResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/response.Response'
      summary: User Registration
      tags:
      - Auth
  /auth/user:
    get:
      description: Retrieve the profile of the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
      security:
      - ApiKeyAuth: []
      summary: Get Current User
      tags:
      - User
  /auth/user/{uuid}:
    get:
      description: Retrieve a specific user's profile using their UUID
      parameters:
      - description: User UUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: Get User By UUID
      tags:
      - User
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: x-api-key
    type: apiKey
swagger: "2.0"
