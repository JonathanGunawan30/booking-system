networks:
  bs-network:
    driver: bridge

services:
  kafka:
    image: apache/kafka:latest
    container_name: bs-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms128M"
    networks:
      - bs-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 320M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  user-service:
    image: jonathangunawan30/bs-user-service:latest
    container_name: bs-user-service
    restart: unless-stopped
    env_file:
      - ./user-service/.env
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - bs-network
    logging: &default-logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  field-service:
    image: jonathangunawan30/bs-field-service:latest
    container_name: bs-field-service
    restart: unless-stopped
    env_file:
      - ./field-service/.env
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - bs-network
    logging: *default-logging

  payment-service:
    image: jonathangunawan30/bs-payment-service:latest
    container_name: bs-payment-service
    restart: unless-stopped
    env_file:
      - ./payment-service/.env
    environment:
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - bs-network
    logging: *default-logging

  order-service-api:
    image: jonathangunawan30/bs-order-service:latest
    container_name: bs-order-service-api
    restart: unless-stopped
    command: ["api"]
    env_file:
      - ./order-service/.env
    environment:
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - bs-network
    logging: *default-logging

  order-service-worker:
    image: jonathangunawan30/bs-order-service:latest
    container_name: bs-order-service-worker
    restart: unless-stopped
    command: ["worker"]
    env_file:
      - ./order-service/.env
    environment:
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - bs-network
    logging: *default-logging

  nginx:
    image: nginx:alpine
    container_name: bs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - user-service
      - field-service
      - payment-service
      - order-service-api
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - bs-network
    logging: *default-logging