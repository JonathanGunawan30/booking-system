version: '3.8'

services:
  # Infrastructure: Kafka (KRaft Mode - No Zookeeper)
  kafka:
    image: bitnami/kafka:latest
    container_name: bs-kafka
    environment:
      # KRaft settings
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - ALLOW_ANONYMOUS_LOGIN=yes
    networks:
      - bs-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server kafka:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Services
  user-service:
    build: ./user-service
    container_name: bs-user-service
    env_file:
      - ./user-service/.env
    environment:
      - PORT=8080
    networks:
      - bs-network

  field-service:
    build: ./field-service
    container_name: bs-field-service
    env_file:
      - ./field-service/.env
    environment:
      - PORT=8002
    networks:
      - bs-network

  payment-service:
    build: ./payment-service
    container_name: bs-payment-service
    env_file:
      - ./payment-service/.env
    environment:
      - PORT=8003
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - bs-network

  order-service-api:
    build: ./order-service
    container_name: bs-order-service-api
    command: api
    env_file:
      - ./order-service/.env
    environment:
      - PORT=8004
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - bs-network

  order-service-worker:
    build: ./order-service
    container_name: bs-order-service-worker
    command: worker
    env_file:
      - ./order-service/.env
    environment:
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - bs-network

  # API Gateway
  nginx:
    image: nginx:alpine
    container_name: bs-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - user-service
      - field-service
      - payment-service
      - order-service-api
    networks:
      - bs-network

networks:
  bs-network:
    driver: bridge
