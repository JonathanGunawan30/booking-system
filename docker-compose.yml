services:
  # Infrastructure: Kafka (KRaft Mode - No Zookeeper)
  kafka:
    image: bitnami/kafka:3.7
    container_name: bs-kafka
    restart: unless-stopped
    environment:
      # KRaft settings
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - ALLOW_ANONYMOUS_LOGIN=yes
      - KAFKA_HEAP_OPTS=-Xmx512M -Xms256M
    networks:
      - bs-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server kafka:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Services
  user-service:
    build: ./user-service
    container_name: bs-user-service
    restart: unless-stopped
    env_file:
      - ./user-service/.env
    environment:
      - PORT=8080
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - bs-network
    logging: &default-logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  field-service:
    build: ./field-service
    container_name: bs-field-service
    restart: unless-stopped
    env_file:
      - ./field-service/.env
    environment:
      - PORT=8002
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - bs-network
    logging: *default-logging

  payment-service:
    build: ./payment-service
    container_name: bs-payment-service
    restart: unless-stopped
    env_file:
      - ./payment-service/.env
    environment:
      - PORT=8003
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - bs-network
    logging: *default-logging

  order-service-api:
    build: ./order-service
    container_name: bs-order-service-api
    restart: unless-stopped
    command: api
    env_file:
      - ./order-service/.env
    environment:
      - PORT=8004
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - bs-network
    logging: *default-logging

  order-service-worker:
    build: ./order-service
    container_name: bs-order-service-worker
    restart: unless-stopped
    command: worker
    env_file:
      - ./order-service/.env
    environment:
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - bs-network
    logging: *default-logging

  # API Gateway
  nginx:
    image: nginx:alpine
    container_name: bs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - user-service
      - field-service
      - payment-service
      - order-service-api
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - bs-network
    logging: *default-logging

networks:
  bs-network:
    driver: bridge